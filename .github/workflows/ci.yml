name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      # TypeScript type-check — fails the build on type errors
      - run: npx tsc --noEmit
      # Lint — removed `|| true` so lint failures block merges
      - run: npm run lint
      # Run tests — currently minimal coverage; expand as suite grows
      - run: npm test
        env:
          NODE_ENV: test
          # Tests use the real env schema; provide the minimum required vars
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://test:test@localhost:5432/test' }}
          JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-ok
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
